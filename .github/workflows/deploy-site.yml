name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "site/docs/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Build and deploy
        run: python -m mkdocs gh-deploy --config-file mkdocs.yml --force
